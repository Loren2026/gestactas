# GitHub Pages Configuration
# Configuración de GitHub Pages para el repositorio GestActas

# GitHub Pages se ejecutará desde la rama 'main' en la raíz del repositorio
# GitHub Pages: https://docs.github.com/es/pages/getting-started-with-github-pages/configuring-a-custom-domain-for-your-github-pages-site

# Configuración de base
baseurl: ""

# Opciones de GitHub Pages
# - source: ruta del contenido (por defecto: /)
# - destination: ruta de salida (por defecto: /)
# - static: si es true, solo archivos estáticos (por defecto: true)
# - serve: si es true, inicia un servidor local (por defecto: false)

# El servidor GitHub Pages servirá el contenido desde la raíz del repositorio
# https://loren2026.github.io/gestactas/
