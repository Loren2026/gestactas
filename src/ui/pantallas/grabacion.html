<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabación - GestActas</title>
    <link rel="stylesheet" href="../../styles.css">
</head>
<body>
    <div class="contenedor-principal">
        <header class="cabecera">
            <h1>Grabación de Junta</h1>
            <a href="juntas-lista.html" class="boton boton-secundario">Volver</a>
        </header>

        <div class="contenedor-grabacion">
            <div class="seccion-grabacion">
                <h2>Visualizador de Audio</h2>
                <div class="contenedor-visualizador">
                    <canvas id="visualizador" width="800" height="200"></canvas>
                </div>
                
                <div class="controles-grabacion">
                    <button id="btn-grabar" class="boton boton-grabar">
                        <span class="icono">🎤</span> Grabar
                    </button>
                    <button id="btn-pausar" class="boton boton-pausar" disabled>
                        <span class="icono">⏸️</span> Pausar
                    </button>
                    <button id="btn-detener" class="boton boton-detener" disabled>
                        <span class="icono">⏹️</span> Detener
                    </button>
                </div>
                
                <div class="informacion-grabacion">
                    <div class="info">
                        <span class="etiqueta">Estado:</span>
                        <span id="estado-grabacion">Listo para grabar</span>
                    </div>
                    <div class="info">
                        <span class="etiqueta">Duración:</span>
                        <span id="duracion">00:00</span>
                    </div>
                </div>
            </div>

            <div class="seccion-grabaciones">
                <h2>Grabaciones de esta Junta</h2>
                <div id="lista-grabaciones" class="lista-grabaciones">
                    <!-- Las grabaciones se cargarán dinámicamente aquí -->
                </div>
                
                <div id="mensaje-vacio-grabaciones" class="mensaje-vacio" style="display: none;">
                    <p>No hay grabaciones para esta junta.</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { grabacionService } from '../../services/grabacion.service.js';
        import { transcripcionService } from '../../services/transcripcion.service.js';
        import { FeedbackUtils } from '../../utilidades/feedback.js';

        class Grabacion {
            constructor() {
                this.juntaId = this.obtenerJuntaId();
                this.tiempoInicio = null;
                this.intervaloTiempo = null;
                this.isGrabando = false;
                
                this.inicializar();
            }

            obtenerJuntaId() {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                
                if (!id) {
                    FeedbackUtils.mostrarError('ID de junta no proporcionado');
                    return null;
                }
                
                return parseInt(id);
            }

            async inicializar() {
                try {
                    await grabacionService.init();
                    await this.cargarGrabaciones();
                    this.configurarEventListeners();
                } catch (error) {
                    console.error('Error al inicializar:', error);
                    FeedbackUtils.mostrarError('Error al inicializar el servicio de grabación');
                }
            }

            async cargarGrabaciones() {
                try {
                    if (!this.juntaId) return;
                    
                    const grabaciones = await grabacionService.obtenerGrabaciones(this.juntaId);
                    this.renderizarGrabaciones(grabaciones);
                } catch (error) {
                    console.error('Error al cargar grabaciones:', error);
                }
            }

            renderizarGrabaciones(grabaciones) {
                const contenedor = document.getElementById('lista-grabaciones');
                const mensajeVacio = document.getElementById('mensaje-vacio-grabaciones');
                
                if (grabaciones.length === 0) {
                    contenedor.innerHTML = '';
                    mensajeVacio.style.display = 'block';
                    return;
                }

                mensajeVacio.style.display = 'none';

                contenedor.innerHTML = grabaciones.map(grabacion => `
                    <div class="tarjeta-grabacion" data-id="${grabacion.id}">
                        <div class="tarjeta-cabecera">
                            <h3>Grabación ${grabacion.id}</h3>
                            <span class="fecha">${this.formatearFecha(grabacion.fecha)}</span>
                        </div>
                        <div class="tarjeta-cuerpo">
                            <div class="informacion">
                                <span class="etiqueta">Duración:</span>
                                <span>${this.formatearDuracion(grabacion.duracion)}</span>
                            </div>
                            <div class="informacion">
                                <span class="etiqueta">Formato:</span>
                                <span>${grabacion.formato}</span>
                            </div>
                            <div class="informacion">
                                <span class="etiqueta">Tamaño:</span>
                                <span>${this.formatearTamaño(grabacion.tamaño)}</span>
                            </div>
                        </div>
                        <div class="tarjeta-pie">
                            <button class="boton boton-reproducir" data-id="${grabacion.id}">
                                <span class="icono">▶️</span> Reproducir
                            </button>
                            <button class="boton boton-transcribir" data-id="${grabacion.id}">
                                <span class="icono">📝</span> Transcribir
                            </button>
                            <button class="boton boton-descargar" data-id="${grabacion.id}">
                                <span class="icono">⬇️</span> Descargar
                            </button>
                        </div>
                    </div>
                `).join('');

                this.configurarEventListenersGrabaciones();
            }

            configurarEventListeners() {
                document.getElementById('btn-grabar').addEventListener('click', () => this.iniciarGrabacion());
                document.getElementById('btn-pausar').addEventListener('click', () => this.pausarGrabacion());
                document.getElementById('btn-detener').addEventListener('click', () => this.detenerGrabacion());
            }

            configurarEventListenersGrabaciones() {
                document.querySelectorAll('.boton-reproducir').forEach(boton => {
                    boton.addEventListener('click', () => {
                        const id = parseInt(boton.dataset.id);
                        this.reproducirGrabacion(id);
                    });
                });

                document.querySelectorAll('.boton-transcribir').forEach(boton => {
                    boton.addEventListener('click', () => {
                        const id = parseInt(boton.dataset.id);
                        this.transcribirGrabacion(id);
                    });
                });

                document.querySelectorAll('.boton-descargar').forEach(boton => {
                    boton.addEventListener('click', () => {
                        const id = parseInt(boton.dataset.id);
                        this.descargarGrabacion(id);
                    });
                });
            }

            async iniciarGrabacion() {
                try {
                    await grabacionService.solicitarAccesoMicrofono();
                    
                    await grabacionService.iniciarGrabacion(this.juntaId);
                    
                    this.isGrabando = true;
                    this.tiempoInicio = Date.now();
                    this.actualizarBotonesGrabando(true);
                    
                    document.getElementById('estado-grabacion').textContent = 'Grabando...';
                    
                    // Inicializar visualizador
                    await grabacionService.inicializarVisualizador('visualizador');
                    grabacionService.iniciarVisualizador();
                    
                    // Iniciar temporizador
                    this.intervaloTiempo = setInterval(() => this.actualizarTiempo(), 1000);
                    
                    FeedbackUtils.mostrarExito('Grabación iniciada');
                } catch (error) {
                    console.error('Error al iniciar grabación:', error);
                    FeedbackUtils.mostrarError('Error al iniciar la grabación');
                }
            }

            async pausarGrabacion() {
                try {
                    if (this.isGrabando) {
                        await grabacionService.pausarGrabacion();
                        this.actualizarBotonesGrabando(false);
                        document.getElementById('estado-grabacion').textContent = 'Pausado';
                        clearInterval(this.intervaloTiempo);
                    } else {
                        await grabacionService.reanudarGrabacion();
                        this.isGrabando = true;
                        this.actualizarBotonesGrabando(true);
                        document.getElementById('estado-grabacion').textContent = 'Grabando...';
                        this.tiempoInicio = Date.now();
                        this.intervaloTiempo = setInterval(() => this.actualizarTiempo(), 1000);
                    }
                } catch (error) {
                    console.error('Error al pausar/reanudar grabación:', error);
                    FeedbackUtils.mostrarError('Error al pausar la grabación');
                }
            }

            async detenerGrabacion() {
                try {
                    const progreso = FeedbackUtils.mostrarProgreso('Deteniendo grabación...', 50);
                    
                    await grabacionService.detenerGrabacion();
                    
                    this.isGrabando = false;
                    this.actualizarBotonesGrabando(false);
                    
                    clearInterval(this.intervaloTiempo);
                    grabacionService.detenerVisualizador();
                    
                    document.getElementById('estado-grabacion').textContent = 'Grabación detenida';
                    
                    progreso.actualizarProgreso(100, 'Grabación guardada');
                    
                    setTimeout(() => {
                        progreso.ocultar();
                        document.getElementById('estado-grabacion').textContent = 'Listo para grabar';
                        document.getElementById('duracion').textContent = '00:00';
                    }, 1000);
                    
                    FeedbackUtils.mostrarExito('Grabación guardada correctamente');
                    await this.cargarGrabaciones();
                } catch (error) {
                    console.error('Error al detener grabación:', error);
                    FeedbackUtils.mostrarError('Error al detener la grabación');
                }
            }

            async reproducirGrabacion(id) {
                try {
                    const grabacion = await grabacionService.obtenerGrabacion(id);
                    grabacionService.reproducirGrabacion(grabacion);
                } catch (error) {
                    console.error('Error al reproducir grabación:', error);
                    FeedbackUtils.mostrarError('Error al reproducir la grabación');
                }
            }

            async transcribirGrabacion(id) {
                const metodo = await FeedbackUtils.mostrarModal(`
                    <p>Selecciona el método de transcripción:</p>
                    <ul>
                        <li><strong>Whisper API:</strong> Alta precisión (~95%), requiere API key de OpenAI</li>
                        <li><strong>Web Speech API:</strong> Precisión media (~65%), gratuita y local</li>
                    </ul>
                `, {
                    titulo: 'Seleccionar Método de Transcripción',
                    botones: [
                        { texto: 'Whisper API', valor: 'whisper', clase: 'boton-primario' },
                        { texto: 'Web Speech API', valor: 'web_speech', clase: 'boton-secundario' },
                        { texto: 'Cancelar', valor: 'cancelar', clase: 'boton-cancelar' }
                    ]
                });

                if (metodo === 'cancelar') {
                    return;
                }

                try {
                    const progreso = FeedbackUtils.mostrarProgreso('Transcribiendo audio...', 0);
                    
                    let resultado;
                    if (metodo === 'whisper') {
                        resultado = await transcripcionService.transcribirConWhisper(id);
                    } else {
                        resultado = await transcripcionService.transcribirConWebSpeechAPI(id);
                    }
                    
                    // Actualizar progreso
                    const actualizarProgreso = setInterval(() => {
                        const progresoActual = transcripcionService.obtenerProgreso();
                        progreso.actualizarProgreso(progresoActual.progreso, 'Transcribiendo...');
                        
                        if (progresoActual.progreso >= 100) {
                            clearInterval(actualizarProgreso);
                        }
                    }, 500);
                    
                    setTimeout(() => {
                        clearInterval(actualizarProgreso);
                        progreso.ocultar();
                        FeedbackUtils.mostrarExito('Transcripción completada');
                        
                        // Mostrar resultado
                        FeedbackUtils.mostrarModal(`
                            <div class="transcripcion-resultado">
                                <h4>Transcripción:</h4>
                                <textarea id="texto-transcripcion" rows="10">${resultado.texto}</textarea>
                                <p><strong>Método:</strong> ${resultado.metodo}</p>
                                <p><strong>Confianza:</strong> ${Math.round(resultado.confianza * 100)}%</p>
                            </div>
                        `, {
                            titulo: 'Transcripción Completada',
                            botones: [
                                { texto: 'Guardar', valor: 'guardar', clase: 'boton-primario' },
                                { texto: 'Cerrar', valor: 'cerrar', clase: 'boton-secundario' }
                            ]
                        }).then(accion => {
                            if (accion === 'guardar') {
                                const textoEditado = document.getElementById('texto-transcripcion').value;
                                transcripcionService.actualizarTranscripcion(resultado.id, textoEditado);
                                FeedbackUtils.mostrarExito('Transcripción guardada');
                            }
                        });
                    }, 1000);
                } catch (error) {
                    console.error('Error al transcribir:', error);
                    FeedbackUtils.mostrarError('Error al transcribir la grabación');
                }
            }

            async descargarGrabacion(id) {
                try {
                    const grabacion = await grabacionService.obtenerGrabacion(id);
                    await grabacionService.descargarGrabacion(grabacion);
                } catch (error) {
                    console.error('Error al descargar grabación:', error);
                    FeedbackUtils.mostrarError('Error al descargar la grabación');
                }
            }

            actualizarBotonesGrabando(grabando) {
                document.getElementById('btn-grabar').disabled = grabando;
                document.getElementById('btn-pausar').disabled = !grabando;
                document.getElementById('btn-detener').disabled = !grabando;
            }

            actualizarTiempo() {
                if (this.tiempoInicio) {
                    const transcurrido = Date.now() - this.tiempoInicio;
                    const segundos = Math.floor(transcurrido / 1000);
                    const minutos = Math.floor(segundos / 60);
                    const segs = segundos % 60;
                    
                    document.getElementById('duracion').textContent = 
                        `${minutos.toString().padStart(2, '0')}:${segs.toString().padStart(2, '0')}`;
                }
            }

            formatearFecha(fecha) {
                const fechaObj = new Date(fecha);
                return fechaObj.toLocaleString('es-ES', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            formatearDuracion(segundos) {
                if (!segundos) return '00:00';
                const mins = Math.floor(segundos / 60);
                const segs = segundos % 60;
                return `${mins.toString().padStart(2, '0')}:${segs.toString().padStart(2, '0')}`;
            }

            formatearTamaño(bytes) {
                if (bytes < 1024) return `${bytes} B`;
                if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(2)} KB`;
                return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
            }
        }

        // Inicializar la aplicación
        document.addEventListener('DOMContentLoaded', () => {
            new Grabacion();
        });
    </script>
</body>
</html>
